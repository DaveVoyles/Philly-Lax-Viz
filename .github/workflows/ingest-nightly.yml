name: ingest-nightly

# Pull current SQLite DB from Azure Files, run ingest, push back, restart app.
# 02:00 America/New_York ≈ 06:00 UTC year-round (close enough for nightly).
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      categories:
        description: 'Comma-separated ingest categories'
        required: false
        default: 'hs-summaries,scoreboard'
      reparse:
        description: 'Force reparse of all posts'
        required: false
        default: 'false'
      laxnumbers_since:
        description: 'LaxNumbers backfill start date (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''
      laxnumbers_until:
        description: 'LaxNumbers backfill end date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.1'
  DB_LOCAL_PATH: ${{ github.workspace }}/data/lacrosse.db
  DB_REMOTE_NAME: lacrosse.db
  AZ_FILE_SHARE: pll-data         # adjust if you named the share differently
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ingest-nightly
  cancel-in-progress: false

jobs:
  ingest:
    # Self-hosted runner on Mac Mini (myoung34/github-runner Ubuntu Jammy container).
    # See ~/docker-stack/github-runner/docker-compose.yml on the host.
    runs-on: [self-hosted, pll]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Azure CLI (self-hosted runner — not pre-installed)
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi
          az --version | head -1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Azure login
        id: azure_login
        # Non-fatal: if Azure credentials are missing/expired the ingest can still run
        # and populate a local DB; the upload/restart steps handle their own checks.
        continue-on-error: true
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download current DB from Azure Files
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          mkdir -p data
          # Tolerate first-run case where the share is empty.
          if az storage file exists \
                --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
                --share-name   "${{ env.AZ_FILE_SHARE }}" \
                --path "${{ env.DB_REMOTE_NAME }}" \
                --query exists -o tsv | grep -q true; then
            az storage file download \
              --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
              --share-name   "${{ env.AZ_FILE_SHARE }}" \
              --path "${{ env.DB_REMOTE_NAME }}" \
              --dest "${{ env.DB_LOCAL_PATH }}"
            echo "Downloaded DB: $(du -h ${{ env.DB_LOCAL_PATH }})"
          else
            echo "::warning::Remote DB not found; ingest will create a fresh one."
          fi

      - name: Snapshot pre-ingest anomaly count
        id: pre
        run: |
          if [ -f "${{ env.DB_LOCAL_PATH }}" ]; then
            COUNT=$(sqlite3 "${{ env.DB_LOCAL_PATH }}" "SELECT COUNT(*) FROM anomalies;" 2>/dev/null || echo 0)
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pre-ingest anomalies: $COUNT"

      - name: Crawl new posts
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          echo "::group::Crawl hs-summaries"
          pnpm --filter @pll/ingest crawl --category=hs-summaries
          echo "::endgroup::"
          echo "::group::Crawl scoreboard"
          pnpm --filter @pll/ingest crawl --category=scoreboard
          echo "::endgroup::"
          echo "::group::Crawl rankings"
          pnpm --filter @pll/ingest crawl --category=rankings
          echo "::endgroup::"

      - name: Sync PIAA schedule
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          pnpm --filter @pll/ingest exec tsx src/scripts/syncPiaa.ts

      - name: Run ingest
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          CATEGORIES="${{ github.event.inputs.categories || 'hs-summaries,scoreboard' }}"
          REPARSE_FLAG=""
          if [ "${{ github.event.inputs.reparse }}" = "true" ]; then
            REPARSE_FLAG="--reparse"
          fi
          IFS=',' read -ra CATS <<< "$CATEGORIES"
          for c in "${CATS[@]}"; do
            echo "::group::Ingest category=$c"
            pnpm --filter @pll/ingest ingest -- --category="$c" $REPARSE_FLAG --db="${{ env.DB_LOCAL_PATH }}"
            echo "::endgroup::"
          done

      - name: Sync Hudl teams
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
          HUDL_EMAIL: ${{ secrets.HUDL_EMAIL }}
          HUDL_PASSWORD: ${{ secrets.HUDL_PASSWORD }}
        # Non-fatal: Hudl scraper requires authenticated session; if credentials are
        # missing or the site changes its layout this step fails gracefully.
        continue-on-error: true
        run: pnpm --filter @pll/ingest exec tsx src/scripts/syncHudl.ts --all --db=${{ env.DB_LOCAL_PATH }}

      - name: Seed team aliases
        # Non-fatal: alias seeding is additive and advisory; a failure here does
        # not corrupt existing alias data and can self-heal on the next run.
        continue-on-error: true
        run: pnpm --filter @pll/ingest seed:aliases ${{ github.workspace }}/data/lacrosse.db

      - name: Run LaxNumbers ingest (PA-only additive)
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          # Default: sweep from season start (Feb 1 of current year) so every
          # nightly run self-heals any gaps and backfills historical data.
          # The ingest is idempotent — already-complete games are skipped in ms.
          SEASON_START="$(date -u +%Y)-02-01"
          LAX_SINCE="${{ inputs.laxnumbers_since || '' }}"
          LAX_UNTIL="${{ inputs.laxnumbers_until || '' }}"
          SINCE="${LAX_SINCE:-$SEASON_START}"
          UNTIL="${LAX_UNTIL:-$TODAY}"
          echo "::group::LaxNumbers PA ingest since=${SINCE} until=${UNTIL}"
          pnpm --filter @pll/ingest ingest -- \
            --source=laxnumbers \
            --since="${SINCE}" \
            --until="${UNTIL}" \
            --apply
          echo "::endgroup::"

      - name: Sync LaxNumbers team ratings
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          echo "::group::LaxNumbers ratings sync"
          pnpm --filter @pll/ingest exec tsx src/scripts/syncLaxNumbersRatings.ts --apply
          echo "::endgroup::"

      - name: Detect dedup candidates
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          echo "::group::Dedup team detection"
          pnpm --filter @pll/ingest exec tsx src/scripts/dedupTeams.ts || echo "::warning::dedupTeams exited non-zero (non-fatal)"
          echo "::endgroup::"

      - name: Snapshot post-ingest anomaly count
        id: post
        run: |
          COUNT=$(sqlite3 "${{ env.DB_LOCAL_PATH }}" "SELECT COUNT(*) FROM anomalies;" 2>/dev/null || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Post-ingest anomalies: $COUNT"

      - name: Check anomaly spike
        env:
          PRE: ${{ steps.pre.outputs.count }}
          POST: ${{ steps.post.outputs.count }}
        run: |
          DELTA=$((POST - PRE))
          echo "Anomaly delta: $DELTA (pre=${PRE}, post=${POST})"
          if [ "$DELTA" -gt 50 ]; then
            echo "::error::Anomaly spike detected: +${DELTA} new anomalies exceeds threshold of 50"
            exit 1
          fi

      - name: Apply community corrections
        run: |
          pnpm --filter @pll/ingest exec tsx src/scripts/applyCorrections.ts \
            --db=${{ env.DB_LOCAL_PATH || 'data/lacrosse.db' }}
        # Non-fatal: corrections script should not block ingest if it encounters an
        # unexpected DB state; unapplied corrections remain in the queue for review.
        continue-on-error: true

      - name: Post-ingest data quality check
        id: data_quality
        # Non-fatal: quality check is advisory; failure here emits a warning but must
        # not abort an otherwise successful ingest run.
        continue-on-error: true
        env:
          DB_PATH: ${{ env.DB_LOCAL_PATH }}
        run: |
          echo "::group::Data quality check"
          pnpm --filter @pll/ingest exec tsx src/scripts/checkDataQuality.ts --db="${{ env.DB_LOCAL_PATH }}"
          echo "::endgroup::"

      - name: Upload updated DB to Azure Files
        # Skip upload if the data quality check hard-failed (exit 1) to avoid
        # pushing a potentially corrupt DB to production. A warning-only run
        # (exit 0 with warnings) still uploads.
        if: steps.data_quality.outcome != 'failure'
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          az storage file upload \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --share-name   "${{ env.AZ_FILE_SHARE }}" \
            --source "${{ env.DB_LOCAL_PATH }}" \
            --path "${{ env.DB_REMOTE_NAME }}"

      - name: Restart Container App revision
        if: steps.azure_login.outcome == 'success'
        # Non-fatal: ACA restart is best-effort after DB upload; if the revision
        # restart fails the container will still pick up the new DB on next request.
        continue-on-error: true
        run: |
          REV=$(az containerapp revision list \
            --name "${{ secrets.ACA_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --query "[?properties.active].name | [0]" -o tsv)
          if [ -n "$REV" ]; then
            az containerapp revision restart \
              --name "${{ secrets.ACA_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --revision "$REV"
            echo "Restarted revision: $REV"
          else
            echo "::warning::No active revision found to restart."
          fi

      - name: Post anomaly delta to Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PRE: ${{ steps.pre.outputs.count }}
          POST: ${{ steps.post.outputs.count }}
        run: |
          DELTA=$((POST - PRE))
          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\":\":lacrosse: nightly ingest done — anomalies ${PRE} → ${POST} (Δ ${DELTA})\"}" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord post failed (non-fatal)"

      - name: Azure logout
        if: always()
        run: az logout
