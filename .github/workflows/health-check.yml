name: health-check

# Ping the live API every 5 minutes to keep the Azure Container App warm.
# Without this, ACA (Consumption plan, scale-to-zero) cold-starts take 15-20s,
# causing dashboard timeouts for users hitting the site after a quiet period.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: none

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: health-check
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping API health
        run: |
          START=$(date +%s%3N)
          HTTP_CODE=$(curl -s --max-time 60 --retry 2 --retry-delay 10 --retry-max-time 120 \
            -o /dev/null -w "%{http_code}" https://phillylaxstats.com/api/teams)
          END=$(date +%s%3N)
          ELAPSED=$((END - START))
          echo "HTTP status: ${HTTP_CODE}  elapsed: ${ELAPSED}ms"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API health check failed - HTTP ${HTTP_CODE} from https://phillylaxstats.com/api/teams"
            exit 1
          fi
          echo "API is healthy (${HTTP_CODE} in ${ELAPSED}ms)"
